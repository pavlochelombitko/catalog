<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects — Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-hover: #1a1a26;
    --border: #1e1e2e;
    --border-hover: #2a2a3e;
    --text: #e4e4ed;
    --text-dim: #7a7a8e;
    --accent: #6ee7b7;
    --accent-dim: rgba(110, 231, 183, 0.08);
    --accent-glow: rgba(110, 231, 183, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(110, 231, 183, 0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(110, 231, 183, 0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 60px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: -1px;
    margin-top: 16px;
    line-height: 1.1;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 16px;
    margin-top: 10px;
    font-weight: 400;
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    padding-top: 20px;
  }

  .stat {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat strong {
    color: var(--accent);
    font-size: 20px;
    display: block;
    margin-bottom: 2px;
    font-family: 'DM Sans', sans-serif;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 16px 12px 42px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .search-box input::placeholder { color: var(--text-dim); }

  .search-box svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    width: 18px;
    height: 18px;
  }

  .sort-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .sort-btn:hover, .sort-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    padding-bottom: 80px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
    animation: cardIn 0.5s ease both;
  }

  .card:hover {
    border-color: var(--border-hover);
    background: var(--surface-hover);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--border-hover);
  }

  .card:hover .card-preview {
    border-color: var(--border-hover);
  }

  .card:hover .card-arrow {
    opacity: 1;
    transform: translate(0, 0);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-preview {
    height: 180px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .card-preview iframe {
    width: 200%;
    height: 200%;
    transform: scale(0.5);
    transform-origin: top left;
    border: none;
    pointer-events: none;
  }

  .card-preview-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    color: var(--accent);
    opacity: 0.3;
    background: linear-gradient(135deg, var(--bg), var(--surface));
  }

  .card-body {
    padding: 18px 20px;
    position: relative;
  }

  .card-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-name .ext {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  .card-date {
    font-size: 13px;
    color: var(--text-dim);
  }

  .card-size {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    opacity: 0.7;
  }

  .card-arrow {
    position: absolute;
    top: 18px;
    right: 18px;
    color: var(--accent);
    opacity: 0;
    transform: translate(-4px, 4px);
    transition: all 0.3s;
  }

  /* Loader */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 20px;
    gap: 20px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Error / Empty */
  .message {
    text-align: center;
    padding: 80px 20px;
  }

  .message h3 {
    font-size: 20px;
    margin-bottom: 8px;
  }

  .message p {
    color: var(--text-dim);
    font-size: 14px;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .message code {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  .config-form {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .config-form input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 8px;
    outline: none;
    width: 260px;
  }

  .config-form input:focus {
    border-color: var(--accent);
  }

  .config-form button {
    background: var(--accent);
    color: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .config-form button:hover { opacity: 0.85; }

  /* Footer */
  footer {
    text-align: center;
    padding: 40px 20px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 640px) {
    header { padding: 40px 0 16px; }
    .grid { grid-template-columns: 1fr; }
    .stats { gap: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-top">
      <div class="logo">⬡ Project Catalog</div>
    </div>
    <h1>My <span>Projects</span></h1>
    <p class="subtitle">Автоматичний каталог усіх сайтів у репозиторії</p>
    <div class="stats">
      <div class="stat">
        <strong id="totalCount">—</strong>
        Проєктів
      </div>
      <div class="stat">
        <strong id="latestDate">—</strong>
        Останнє оновлення
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Шукати проєкт...">
    </div>
    <button class="sort-btn active" id="sortNewBtn" onclick="setSort('new')">Новіші ↓</button>
    <button class="sort-btn" id="sortOldBtn" onclick="setSort('old')">Старіші ↑</button>
    <button class="sort-btn" id="sortAzBtn" onclick="setSort('az')">A → Z</button>
  </div>

  <div id="content">
    <div class="loader">
      <div class="spinner"></div>
      <div class="loader-text">Завантаження проєктів...</div>
    </div>
  </div>
</div>

<footer id="footer" style="display:none;">
  Powered by GitHub API • Auto-generated catalog
</footer>

<script>
(function() {
  let allFiles = [];
  let currentSort = 'new';

  // Auto-detect repo from GitHub Pages URL, or use config
  function detectRepo() {
    const host = window.location.hostname;
    const path = window.location.pathname;

    // username.github.io (root repo)
    if (host.endsWith('.github.io')) {
      const user = host.replace('.github.io', '');
      const pathParts = path.split('/').filter(Boolean);

      if (pathParts.length > 0 && pathParts[0] !== 'index.html') {
        // It's a project page: username.github.io/repo-name/
        return { user, repo: pathParts[0], subfolder: pathParts.slice(1).join('/') };
      }
      // Root user page
      return { user, repo: `${user}.github.io`, subfolder: '' };
    }

    return null;
  }

  function showConfig() {
    document.getElementById('content').innerHTML = `
      <div class="message">
        <h3>Налаштування репозиторію</h3>
        <p>Не вдалось визначити репозиторій автоматично. Введіть дані вручну:</p>
        <div class="config-form">
          <input type="text" id="repoInput" placeholder="username/repository">
          <button onclick="window.__loadRepo()">Завантажити</button>
        </div>
      </div>
    `;
  }

  window.__loadRepo = function() {
    const val = document.getElementById('repoInput').value.trim();
    const parts = val.split('/');
    if (parts.length === 2) {
      fetchFiles({ user: parts[0], repo: parts[1], subfolder: '' });
    }
  };

  async function fetchFiles(config) {
    const { user, repo, subfolder } = config;

    try {
      // Fetch repo contents
      const contentsUrl = subfolder
        ? `https://api.github.com/repos/${user}/${repo}/contents/${subfolder}`
        : `https://api.github.com/repos/${user}/${repo}/contents`;

      const res = await fetch(contentsUrl);
      if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
      const contents = await res.json();

      // Filter HTML files (exclude this index.html)
      const htmlFiles = contents.filter(f =>
        f.type === 'file' &&
        f.name.endsWith('.html') &&
        f.name.toLowerCase() !== 'index.html' &&
        f.name.toLowerCase() !== '404.html'
      );

      if (htmlFiles.length === 0) {
        // Also check subdirectories for index.html files (project folders)
        const dirs = contents.filter(f => f.type === 'dir' && !f.name.startsWith('.') && f.name !== 'node_modules');
        const folderProjects = [];

        for (const dir of dirs) {
          try {
            const dirRes = await fetch(dir.url);
            if (!dirRes.ok) continue;
            const dirContents = await dirRes.json();
            const hasIndex = dirContents.find(f => f.name === 'index.html');
            if (hasIndex) {
              folderProjects.push({
                name: dir.name,
                html_url: dir.html_url,
                size: hasIndex.size,
                path: dir.path,
                isFolder: true
              });
            }
          } catch(e) { /* skip */ }
        }

        if (folderProjects.length === 0 && htmlFiles.length === 0) {
          showEmpty();
          return;
        }

        // Merge
        htmlFiles.push(...folderProjects);
      }

      // Fetch commit dates for sorting
      const filesWithDates = await Promise.all(
        htmlFiles.map(async (file) => {
          try {
            const filePath = file.isFolder ? file.path + '/index.html' : file.path || file.name;
            const commitRes = await fetch(
              `https://api.github.com/repos/${user}/${repo}/commits?path=${encodeURIComponent(filePath)}&per_page=1`
            );
            if (commitRes.ok) {
              const commits = await commitRes.json();
              if (commits.length > 0) {
                file.lastModified = new Date(commits[0].commit.committer.date);
                file.commitMsg = commits[0].commit.message;
              }
            }
          } catch(e) { /* fallback: no date */ }

          if (!file.lastModified) {
            file.lastModified = new Date(0);
          }

          // Build the page URL
          const baseUrl = subfolder
            ? `https://${user}.github.io/${repo}/${subfolder}`
            : (repo === `${user}.github.io`
              ? `https://${user}.github.io`
              : `https://${user}.github.io/${repo}`);

          file.pageUrl = file.isFolder
            ? `${baseUrl}/${file.name}/`
            : `${baseUrl}/${file.name}`;

          return file;
        })
      );

      allFiles = filesWithDates;
      updateStats();
      renderFiles();
      document.getElementById('footer').style.display = 'block';

    } catch (err) {
      document.getElementById('content').innerHTML = `
        <div class="message">
          <h3>Помилка завантаження</h3>
          <p>${err.message}. Перевірте, чи репозиторій є публічним.</p>
          <div class="config-form">
            <input type="text" id="repoInput" placeholder="username/repository">
            <button onclick="window.__loadRepo()">Спробувати</button>
          </div>
        </div>
      `;
    }
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = allFiles.length;
    const dates = allFiles.map(f => f.lastModified).filter(d => d.getTime() > 0);
    if (dates.length > 0) {
      const latest = new Date(Math.max(...dates.map(d => d.getTime())));
      document.getElementById('latestDate').textContent = formatDate(latest);
    }
  }

  function formatDate(d) {
    if (!d || d.getTime() === 0) return '—';
    const months = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function getDisplayName(file) {
    const name = file.name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' ');
    return name.charAt(0).toUpperCase() + name.slice(1);
  }

  function sortFiles(files) {
    const sorted = [...files];
    switch (currentSort) {
      case 'new':
        sorted.sort((a, b) => b.lastModified - a.lastModified);
        break;
      case 'old':
        sorted.sort((a, b) => a.lastModified - b.lastModified);
        break;
      case 'az':
        sorted.sort((a, b) => a.name.localeCompare(b.name));
        break;
    }
    return sorted;
  }

  function renderFiles() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allFiles.filter(f =>
      f.name.toLowerCase().includes(search) ||
      (f.commitMsg && f.commitMsg.toLowerCase().includes(search))
    );

    filtered = sortFiles(filtered);

    if (filtered.length === 0) {
      document.getElementById('content').innerHTML = `
        <div class="message">
          <h3>Нічого не знайдено</h3>
          <p>Спробуйте інший пошуковий запит</p>
        </div>
      `;
      return;
    }

    const cards = filtered.map((file, i) => {
      const displayName = getDisplayName(file);
      const ext = file.isFolder ? 'DIR' : 'HTML';
      const delay = Math.min(i * 0.06, 0.5);

      return `
        <a class="card" href="${file.pageUrl}" target="_blank" rel="noopener" style="animation-delay: ${delay}s">
          <div class="card-preview">
            <iframe src="${file.pageUrl}" loading="lazy" sandbox="allow-same-origin" tabindex="-1" title="${displayName}"></iframe>
          </div>
          <div class="card-body">
            <div class="card-name">
              ${displayName}
              <span class="ext">${ext}</span>
            </div>
            <div class="card-date">${formatDate(file.lastModified)}</div>
            ${file.commitMsg ? `<div class="card-size">${file.commitMsg.substring(0, 50)}</div>` : ''}
            ${file.size ? `<div class="card-size">${formatSize(file.size)}</div>` : ''}
            <div class="card-arrow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
            </div>
          </div>
        </a>
      `;
    }).join('');

    document.getElementById('content').innerHTML = `<div class="grid">${cards}</div>`;
  }

  function showEmpty() {
    document.getElementById('content').innerHTML = `
      <div class="message">
        <h3>Проєктів не знайдено</h3>
        <p>У цьому репозиторії немає HTML-файлів, окрім <code>index.html</code></p>
      </div>
    `;
  }

  window.setSort = function(mode) {
    currentSort = mode;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sort' + mode.charAt(0).toUpperCase() + mode.slice(1) + 'Btn').classList.add('active');
    renderFiles();
  };

  document.getElementById('searchInput').addEventListener('input', () => {
    renderFiles();
  });

  // Init
  const repo = detectRepo();
  if (repo) {
    fetchFiles(repo);
  } else {
    showConfig();
  }

})();
</script>

</body>
</html>
